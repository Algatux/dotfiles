#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# Setting wayland environment variables for graphical applications launched outside of Hyprland (like from TTYs or systemd services)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start graphical-session.target

# Set wallpapers with swww (swaybg/wallpaper client) at startup
exec-once = swww img ~/Pictures/Wallpapers/bladerunner_2560x1440.png --outputs "DP-1" --resize fit
exec-once = swww img ~/Pictures/Wallpapers/pixel-gameboy.png --outputs "DP-3" --resize fit --fill-color "747a78"

# launch a kitty isntance with class "scratchpad" to be used as a scratchpad workspace
exec-once = kitty --class scratchpad