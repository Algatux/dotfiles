####################
### WINDOW RULES ###
####################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# FASTFETCH
windowrule {
    name = fastfetch-pop-setup
    
    match:class = ^(fastfetch-pop)$
    float = yes
    size = 800 570
    center = yes
}

# BTOP 
windowrule {
    name = btop-floating-setup
    
    match:class = ^(btop-floating)$
    float = yes
    size = 1024 800
    center = yes
    pin = yes
}

# WORLD OF WARCRAFT
windowrule {
    name = world-of-warcraft-workaspace-fullscreen
    match:title = ^(World of Warcraft).*
    workspace = 2
    fullscreen = true
    monitor = DP-1
}

# -----------------------------------------------------
# STEAM & GAMING RULES
# -----------------------------------------------------

# STEAM CHAT & FRIENDS
windowrule {
    name = steam-chat-floating
    # Cattura sia la lista amici che le finestre di chat
    match:title = ^(Friends List|Steam Chat).*$
    float = yes
    stay_focused = false
    min_size = 300 450
}